# ==========================================
# BingoPatataPlugin - Equipos Predefinidos
# ==========================================
#
# Este archivo define los equipos disponibles para el juego.
# Puedes añadir, modificar o eliminar equipos según necesites.
#
# Formato:
#   nombre_equipo:
#     name: "Nombre visible"
#     color: "color" (ver colores disponibles abajo)
#
# Colores disponibles:
# red, dark_red, green, dark_green, yellow, gold, blue, dark_blue,
# aqua, dark_aqua, purple, light_purple, white, gray, dark_gray, black

teams:
